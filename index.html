<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0e0e1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Voice Lists</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  :root {
    --bg:          #0e0e1a;
    --surface:     #16182a;
    --surface2:    #1e2138;
    --border:      rgba(255,255,255,0.08);
    --text:        rgba(255,255,255,0.92);
    --muted:       rgba(255,255,255,0.38);
    --purple:      #7c3aed;
    --purple2:     #4f46e5;
    --cyan:        #06b6d4;
    --red:         #dc2626;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; padding-top: var(--safe-top); }
  .screen.active { display: flex; }
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px 16px; }
  .scroll::-webkit-scrollbar { display: none; }
  .header { padding: 20px 20px 12px; flex-shrink: 0; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-top: 4px; }
  .bottom-bar { flex-shrink: 0; padding: 16px 24px; padding-bottom: calc(20px + var(--safe-bottom)); background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; }

  /* ── SVG icon helper ── */
  .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon svg { display: block; }

  /* ── List cards ── */
  .list-card {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 16px 16px 0;
    margin-bottom: 10px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    border-left: 4px solid var(--card-accent, var(--purple));
    cursor: pointer; transition: background 0.15s; position: relative;
    overflow: hidden;
  }
  .list-card:active { background: var(--surface2); }
  .list-icon-wrap { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; margin-left: 12px; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 600; }
  .list-progress { margin-top: 8px; height: 3px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
  .list-progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .list-del { background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; padding: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .list-del:active svg { stroke: rgba(239,68,68,0.8); }

  /* ── FAB ── */
  .fab { width: 56px; height: 56px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--purple), var(--purple2)); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 28px rgba(124,58,237,0.45), 0 8px 20px rgba(0,0,0,0.4); transition: transform 0.15s; }
  .fab:active { transform: scale(0.94); }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 80px 32px 32px; color: var(--muted); }
  .empty .emoji { font-size: 52px; display: block; margin-bottom: 14px; }
  .empty p { font-size: 16px; font-weight: 600; line-height: 1.5; }
  .empty small { font-size: 13px; color: rgba(255,255,255,0.2); margin-top: 8px; display: block; line-height: 1.6; }

  /* ── Progress ── */
  .progress-wrap { margin-top: 10px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 5px; font-weight: 600; }

  /* ── Detail header ── */
  .back-btn { background: none; border: none; color: #a78bfa; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-family: inherit; padding: 0; }
  .detail-title-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .detail-title-left { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; min-width: 0; }
  .detail-icon { font-size: 28px; flex-shrink: 0; }
  .detail-name-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
  .detail-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .count-badge { background: rgba(120,80,255,0.15); border: 1px solid rgba(120,80,255,0.3); border-radius: 20px; padding: 6px 14px; color: #a78bfa; font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* ── Rename listening state ── */
  .rename-listening { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 10px 14px; background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25); border-radius: 12px; }
  .rename-transcript { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.55); font-style: italic; flex: 1; }
  .rename-transcript.has-text { color: rgba(255,255,255,0.85); font-style: normal; }
  .rename-cancel { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; font-family: inherit; }

  /* ── Items ── */
  .item-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; margin-bottom: 8px; border-radius: 16px; border: 1px solid var(--border); animation: slideIn 0.22s ease; transition: background 0.15s; }
  .item-row.unchecked { background: var(--surface); }
  .item-row.checked   { background: rgba(255,255,255,0.025); border-color: rgba(255,255,255,0.04); }
  .checkbox { width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; border: 2px solid rgba(124,58,237,0.55); background: transparent; }
  .checkbox.done { background: linear-gradient(135deg, var(--purple), var(--cyan)); border: none; box-shadow: 0 0 10px rgba(124,58,237,0.35); }
  .item-text { flex: 1; font-size: 17px; font-weight: 600; transition: all 0.2s; }
  .item-text.done { color: rgba(255,255,255,0.25); text-decoration: line-through; }
  .item-del-btn { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 0 4px; display: flex; align-items: center; transition: color 0.15s; }
  .item-del-btn:active { color: rgba(239,68,68,0.7); }

  /* ── Day group ── */
  .day-group { margin-bottom: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.07); overflow: hidden; animation: slideIn 0.22s ease; }
  .day-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; }
  .day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .day-label { flex: 1; font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .day-count { font-size: 12px; color: var(--muted); font-weight: 600; }
  .day-del { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 2px 4px; margin-left: 4px; display: flex; align-items: center; }
  .day-del:active { color: rgba(239,68,68,0.7); }
  .day-body { background: rgba(255,255,255,0.02); padding: 6px 10px 10px; }
  .sub-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-bottom: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); }
  .sub-row.checked { background: rgba(255,255,255,0.015); border-color: rgba(255,255,255,0.03); }
  .sub-checkbox { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .sub-text { flex: 1; font-size: 16px; font-weight: 600; transition: all 0.2s; }
  .sub-text.done { color: rgba(255,255,255,0.25); text-decoration: line-through; }
  .sub-del { background: none; border: none; color: rgba(255,255,255,0.15); cursor: pointer; padding: 0 4px; display: flex; align-items: center; }
  .sub-del:active { color: rgba(239,68,68,0.7); }
  .day-empty { padding: 10px 8px; font-size: 14px; font-style: italic; color: rgba(255,255,255,0.2); font-weight: 600; }
  .clear-btn { text-align: center; color: rgba(239,68,68,0.45); font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer; border: none; background: none; width: 100%; font-family: inherit; }

  /* ── Voice bar ── */
  .voice-bar { margin: 0 16px 10px; padding: 12px 16px; background: rgba(124,58,237,0.10); border: 1px solid rgba(124,58,237,0.22); border-radius: 16px; }
  .waveform { display: flex; align-items: center; justify-content: center; gap: 3px; height: 28px; margin-bottom: 6px; }
  .wave-bar { width: 3px; border-radius: 2px; transition: height 0.1s; }
  .voice-transcript { font-size: 13px; font-weight: 600; text-align: center; color: rgba(255,255,255,0.35); font-style: italic; min-height: 18px; }
  .voice-transcript.has-text { color: rgba(255,255,255,0.75); font-style: normal; }

  /* ── Mic pill button ── */
  .mic-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .mic-ring { position: absolute; border-radius: 50%; border: 1.5px solid rgba(124,58,237,0.2); pointer-events: none; }
  .mic-btn { display: flex; align-items: center; justify-content: center; gap: 10px; height: 52px; padding: 0 26px; border-radius: 26px; border: none; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; position: relative; z-index: 1; }
  .mic-btn.idle   { background: linear-gradient(135deg, var(--purple), var(--purple2)); color: #fff; box-shadow: 0 0 22px rgba(124,58,237,0.3), 0 4px 14px rgba(0,0,0,0.3); }
  .mic-btn.active { background: linear-gradient(135deg, var(--red), #ef4444); color: #fff; box-shadow: 0 0 22px rgba(220,38,38,0.35), 0 4px 14px rgba(0,0,0,0.3); }
  .mic-btn:active { transform: scale(0.97); }
  .mic-label { letter-spacing: 0.2px; }

  /* ── Create listening overlay ── */
  .create-listen { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 24px; padding: 40px; }
  .create-listen-title { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; }
  .create-listen-transcript { font-size: 28px; font-weight: 800; color: #fff; text-align: center; min-height: 40px; letter-spacing: -0.5px; }
  .create-listen-cancel { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 700; padding: 12px 28px; cursor: pointer; font-family: inherit; margin-top: 10px; }

  /* ── Flash ── */
  #flash { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--purple), var(--cyan)); color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 15px; font-weight: 700; box-shadow: 0 8px 24px rgba(124,58,237,0.4); white-space: nowrap; z-index: 200; display: none; animation: fadeUp 0.2s ease; pointer-events: none; }

  /* ── Animations ── */
  @keyframes slideIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes pulseRing { 0%{opacity:0.5;transform:scale(0.9)} 100%{opacity:0;transform:scale(1.5)} }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="header">
      <div class="label">Voice Lists</div>
      <div class="title">My Lists</div>
    </div>
    <div class="scroll" id="home-scroll"></div>
    <div class="bottom-bar">
      <button class="fab" id="fab-new" aria-label="New list">
        <!-- Plus icon -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="header" id="detail-header">
      <button class="back-btn" id="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        All Lists
      </button>
      <div class="detail-title-row">
        <div class="detail-title-left" id="detail-title-left">
          <span class="detail-icon" id="detail-icon"></span>
          <div class="detail-name-wrap">
            <span class="detail-name" id="detail-name"></span>
            <!-- Pencil icon -->
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </div>
        </div>
        <div class="count-badge" id="detail-count"></div>
      </div>
      <!-- Rename listening bar -->
      <div id="rename-listening" class="rename-listening" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span class="rename-transcript" id="rename-transcript">Listening for new name…</span>
        <button class="rename-cancel" id="rename-cancel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="progress-wrap" id="detail-progress" style="display:none;">
        <div class="progress-bar"><div class="progress-fill" id="detail-progress-fill"></div></div>
        <div class="progress-label" id="detail-progress-label"></div>
      </div>
    </div>

    <div class="scroll" id="detail-scroll"></div>

    <div class="voice-bar" id="voice-bar" style="display:none;">
      <div class="waveform" id="item-waveform"></div>
      <div class="voice-transcript" id="item-transcript">Listening…</div>
    </div>

    <div class="bottom-bar">
      <div class="mic-wrap" id="mic-wrap">
        <button class="mic-btn idle" id="mic-btn">
          <!-- Mic icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span class="mic-label" id="mic-label">Tap to speak</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div id="flash"></div>

<!-- Create listening overlay -->
<div id="create-listen" class="create-listen" style="display:none;">
  <div class="waveform" id="create-waveform"></div>
  <div class="create-listen-title">Name your list</div>
  <div class="create-listen-transcript" id="create-transcript">Listening…</div>
  <button class="create-listen-cancel" id="create-cancel">Cancel</button>
</div>

<script>
// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const STORAGE_KEY = 'voice-lists-v1';

const ACCENT_COLORS = [
  '#7c3aed', '#4f46e5', '#0891b2', '#0d9488',
  '#16a34a', '#ca8a04', '#dc2626', '#db2777',
  '#9333ea', '#2563eb', '#059669', '#d97706'
];

const DAY_COLORS = {
  monday:    { bg:'#4f46e5', light:'rgba(79,70,229,0.12)',   border:'rgba(79,70,229,0.3)' },
  tuesday:   { bg:'#0891b2', light:'rgba(8,145,178,0.12)',   border:'rgba(8,145,178,0.3)' },
  wednesday: { bg:'#16a34a', light:'rgba(22,163,74,0.12)',   border:'rgba(22,163,74,0.3)' },
  thursday:  { bg:'#d97706', light:'rgba(217,119,6,0.12)',   border:'rgba(217,119,6,0.3)' },
  friday:    { bg:'#db2777', light:'rgba(219,39,119,0.12)',  border:'rgba(219,39,119,0.3)' },
  saturday:  { bg:'#7c3aed', light:'rgba(124,58,237,0.12)',  border:'rgba(124,58,237,0.3)' },
  sunday:    { bg:'#dc2626', light:'rgba(220,38,38,0.12)',   border:'rgba(220,38,38,0.3)' },
};
const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

const ICON_RULES = [
  [['shop','grocer','supermarket','market','buy','tesco','asda','sainsbury'],'🛒'],
  [['holiday','travel','trip','vacation','flight','pack','suitcase'],'✈️'],
  [['christmas','xmas','festive','advent'],'🎄'],
  [['school','study','book','homework','college','university','revision','learn'],'📚'],
  [['gym','fitness','workout','exercise','training','weights'],'💪'],
  [['home','house','flat','diy','repair','declutter'],'🏠'],
  [['medicine','medical','doctor','pharmacy','health','prescription'],'💊'],
  [['game','gaming','xbox','playstation','nintendo'],'🎮'],
  [['music','playlist','song','album','concert','band'],'🎵'],
  [['work','office','meeting','project','job','business','client'],'💼'],
  [['meal','dinner','lunch','breakfast','recipe','cook','bake'],'🍕'],
  [['garden','plant','flower','grow','allotment'],'🌿'],
  [['pet','dog','cat','animal','vet'],'🐾'],
  [['birthday','gift','present','party','celebrate','anniversary'],'🎁'],
  [['fix','repair','tool','build','install'],'🔧'],
  [['art','draw','paint','design','craft','creative'],'🎨'],
  [['football','soccer','sport','match','team'],'⚽'],
  [['clean','hoover','tidy','laundry','wash','chores'],'🧹'],
  [['idea','plan','brainstorm','note','reminder'],'💡'],
  [['baby','toddler','nappy'],'🧸'],
  [['wine','drink','beer','alcohol','pub','bar'],'🍷'],
  [['church','ministry','prayer','worship','sermon','bible','sunday'],'⛪'],
  [['money','budget','finance','bill','pay','invoice','tax','savings'],'💰'],
  [['car','drive','vehicle','mot','service','fuel','parking'],'🚗'],
  [['week','monday','tuesday','wednesday','schedule','plan','daily'],'📅'],
  [['kids','children','family','son','daughter'],'👨‍👩‍👧'],
];

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function autoIcon(name) {
  const lower = (name||'').toLowerCase();
  for (const [kw, icon] of ICON_RULES) {
    if (kw.some(k => lower.includes(k))) return icon;
  }
  return '📋';
}
function capFirst(s) { s=(s||'').trim(); return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function randomAccent() { return ACCENT_COLORS[Math.floor(Math.random()*ACCENT_COLORS.length)]; }

function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]; } catch { return []; } }
function saveData() { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(state.lists)); } catch {} }

function parseVoice(text) {
  const lower = text.trim().toLowerCase();
  for (const day of DAYS) {
    if (lower.startsWith(day)) return { isDay:true, day, rest:text.trim().slice(day.length).trim() };
  }
  return { isDay:false, text:text.trim() };
}

// SVG icons as strings for use in innerHTML
const SVG = {
  check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  close: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  chevDown: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
  chevUp:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`,
  trash:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const state = {
  lists: loadData(),
  currentListId: null,
  activeDayId: null,
  renaming: false,
  selectedColor: 0,
};

function currentList() { return state.lists.find(l=>l.id===state.currentListId); }
function mutateItems(fn) {
  state.lists = state.lists.map(l=>l.id===state.currentListId?{...l,items:fn(l.items||[])}:l);
  saveData();
}
function countItems(items=[]) {
  let total=0,done=0;
  for (const item of items) {
    if (item.type==='item'){total++;if(item.checked)done++;}
    else if(item.type==='day-group'){for(const si of item.items||[]){total++;if(si.checked)done++;}}
  }
  return {total,done};
}

// ═══════════════════════════════════════
//  FLASH
// ═══════════════════════════════════════
let flashTimer=null;
function flash(msg) {
  const el=document.getElementById('flash');
  el.textContent='✓ '+msg; el.style.display='block';
  clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>{el.style.display='none';},1800);
}

// ═══════════════════════════════════════
//  WAVEFORM
// ═══════════════════════════════════════
function buildWave(container) {
  container.innerHTML='';
  return Array.from({length:20},(_,i)=>{
    const b=document.createElement('div');
    b.className='wave-bar';
    b.style.background=`hsl(${260+i*4},70%,65%)`;
    b.style.height='4px';
    container.appendChild(b);
    return b;
  });
}

// ═══════════════════════════════════════
//  VOICE ENGINE
// ═══════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function makeVoice() {
  let rec=null, waveTimer=null, isOn=false;
  return {
    get isOn(){return isOn;},
    start(onResult, opts={}) {
      if(!SR){alert('Speech recognition requires Chrome.');return;}
      rec=new SR();
      rec.continuous=false; rec.interimResults=true; rec.lang='en-US';
      rec.onresult=e=>{
        for(let i=e.resultIndex;i<e.results.length;i++){
          const r=e.results[i];
          onResult(r[0].transcript.trim(), r.isFinal);
        }
      };
      rec.onend=()=>{isOn=false;if(opts.onEnd)opts.onEnd();};
      rec.onerror=()=>{isOn=false;if(opts.onEnd)opts.onEnd();};
      rec.start(); isOn=true;
    },
    stop(){try{rec&&rec.stop();}catch{}isOn=false;},
    startWave(bars){waveTimer=setInterval(()=>{bars.forEach(b=>{b.style.height=(Math.random()*26+4)+'px';});},110);},
    stopWave(){clearInterval(waveTimer);}
  };
}

const itemVoice   = makeVoice();
const createVoice = makeVoice();
const renameVoice = makeVoice();

// ═══════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════
//  HOME SCREEN
// ═══════════════════════════════════════
function renderHome() {
  const scroll=document.getElementById('home-scroll');
  if(!state.lists.length){
    scroll.innerHTML=`<div class="empty"><span class="emoji">📋</span><p>Tap + to create your first list</p></div>`;
    return;
  }
  scroll.innerHTML=state.lists.map(l=>{
    const {total,done}=countItems(l.items);
    const pct=total?(done/total*100):0;
    const accent=l.accent||'#7c3aed';
    return `
      <div class="list-card" data-id="${l.id}" style="--card-accent:${accent}">
        <div class="list-icon-wrap">${l.icon}</div>
        <div class="list-info">
          <div class="list-name">${esc(l.name)}</div>
          <div class="list-meta">${total} item${total!==1?'s':''} · ${done} done</div>
          ${total?`<div class="list-progress"><div class="list-progress-fill" style="width:${pct}%;background:${accent}"></div></div>`:''}
        </div>
        <button class="list-del" data-del="${l.id}" aria-label="Delete">${SVG.trash}</button>
      </div>`;
  }).join('');

  scroll.querySelectorAll('.list-card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('[data-del]'))return;
      openList(card.dataset.id);
    });
  });
  scroll.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      state.lists=state.lists.filter(l=>l.id!==btn.dataset.del);
      saveData(); renderHome();
    });
  });
}

// ═══════════════════════════════════════
//  CREATE LIST — direct voice
// ═══════════════════════════════════════
let createBars=[];
const createOverlay=document.getElementById('create-listen');
const createWf=document.getElementById('create-waveform');
const createTx=document.getElementById('create-transcript');

document.getElementById('fab-new').addEventListener('click',()=>{
  openCreateListen();
});

document.getElementById('create-cancel').addEventListener('click',()=>{
  createVoice.stop(); createVoice.stopWave();
  createOverlay.style.display='none';
});

function openCreateListen() {
  createBars=buildWave(createWf);
  createTx.textContent='Listening…';
  createOverlay.style.display='flex';

  createVoice.start((text,isFinal)=>{
    createTx.textContent=text||'Listening…';
    if(isFinal&&text){
      const name=capFirst(text);
      createVoice.stop(); createVoice.stopWave();
      createOverlay.style.display='none';
      createNewList(name);
    }
  },{
    onEnd:()=>{
      createVoice.stopWave();
      // If nothing was heard, close the overlay
      if(createOverlay.style.display!=='none'&&!createTx.textContent.trim()||createTx.textContent==='Listening…'){
        createOverlay.style.display='none';
      }
    }
  });
  createVoice.startWave(createBars);
}

function createNewList(name) {
  const newList={
    id:uid(), name, icon:autoIcon(name),
    accent:randomAccent(), items:[], createdAt:Date.now()
  };
  state.lists.unshift(newList);
  saveData();
  renderHome();
  // Immediately open the new list
  openList(newList.id);
}

// ═══════════════════════════════════════
//  DETAIL SCREEN
// ═══════════════════════════════════════
function openList(id) {
  state.currentListId=id;
  state.activeDayId=null;
  state.renaming=false;
  renderDetail();
  showScreen('screen-detail');
}

function renderDetail() {
  const list=currentList(); if(!list)return;
  const accent=list.accent||'#7c3aed';
  const {total,done}=countItems(list.items);
  const pct=total?(done/total*100):0;

  document.getElementById('detail-icon').textContent=list.icon;
  document.getElementById('detail-name').textContent=list.name;
  document.getElementById('detail-count').textContent=`${total} item${total!==1?'s':''}`;

  // Accent the progress fill with list colour
  const prog=document.getElementById('detail-progress');
  if(total>0){
    prog.style.display='';
    document.getElementById('detail-progress-fill').style.cssText=`width:${pct}%;background:${accent}`;
    document.getElementById('detail-progress-label').textContent=`${done} of ${total} done`;
  } else prog.style.display='none';

  renderItems();
}

function renderItems() {
  const list=currentList();
  const scroll=document.getElementById('detail-scroll');
  const items=list?.items||[];

  if(!items.length){
    scroll.innerHTML=`
      <div class="empty">
        <span class="emoji">🎤</span>
        <p>Tap the mic and speak your items</p>
        <small>Start with a day e.g. "Monday Drama club"<br>to create a day group</small>
      </div>`;
    return;
  }

  let html='';
  for(const item of items){
    if(item.type==='item'){
      html+=`
        <div class="item-row ${item.checked?'checked':'unchecked'}">
          <div class="checkbox ${item.checked?'done':''}" data-toggle="${item.id}">
            ${item.checked?SVG.check:''}
          </div>
          <span class="item-text ${item.checked?'done':''}">${esc(item.text)}</span>
          <button class="item-del-btn" data-del="${item.id}" style="color:rgba(255,255,255,0.2)">${SVG.close}</button>
        </div>`;
    } else if(item.type==='day-group'){
      const dc=DAY_COLORS[item.day]||DAY_COLORS.monday;
      const gDone=(item.items||[]).filter(si=>si.checked).length;
      html+=`
        <div class="day-group" style="border-color:${dc.border}">
          <div class="day-header" style="background:${dc.light}" data-collapse="${item.id}">
            <div class="day-dot" style="background:${dc.bg}"></div>
            <span class="day-label" style="color:${dc.bg}">${item.day}</span>
            <span class="day-count">${gDone}/${(item.items||[]).length}</span>
            <span style="color:rgba(255,255,255,0.3)">${item.collapsed?SVG.chevDown:SVG.chevUp}</span>
            <button class="day-del" data-gdel="${item.id}">${SVG.close}</button>
          </div>
          ${!item.collapsed?`
          <div class="day-body">
            ${!(item.items||[]).length?'<div class="day-empty">No items yet — speak to add</div>':
              (item.items||[]).map(si=>`
              <div class="sub-row ${si.checked?'checked':''}">
                <div class="sub-checkbox" style="${si.checked?`background:${dc.bg};border:none`:`border:2px solid ${dc.bg}77;background:transparent`}" data-subtoggle="${si.id}" data-gid="${item.id}">
                  ${si.checked?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
                </div>
                <span class="sub-text ${si.checked?'done':''}">${esc(si.text)}</span>
                <button class="sub-del" data-subdel="${si.id}" data-gid="${item.id}" style="color:rgba(255,255,255,0.18)">${SVG.close}</button>
              </div>`).join('')}
          </div>`:''}
        </div>`;
    }
  }

  const hasChecked=items.some(i=>(i.type==='item'&&i.checked)||(i.type==='day-group'&&(i.items||[]).some(si=>si.checked)));
  if(hasChecked) html+=`<button class="clear-btn" id="clear-btn">Clear completed</button>`;

  scroll.innerHTML=html;

  scroll.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',()=>toggleItem(el.dataset.toggle)));
  scroll.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteItem(el.dataset.del);}));
  scroll.querySelectorAll('[data-collapse]').forEach(el=>el.addEventListener('click',e=>{if(!e.target.closest('[data-gdel]'))toggleCollapse(el.dataset.collapse);}));
  scroll.querySelectorAll('[data-gdel]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteItem(el.dataset.gdel);}));
  scroll.querySelectorAll('[data-subtoggle]').forEach(el=>el.addEventListener('click',()=>toggleSubItem(el.dataset.gid,el.dataset.subtoggle)));
  scroll.querySelectorAll('[data-subdel]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteSubItem(el.dataset.gid,el.dataset.subdel);}));
  const cb=document.getElementById('clear-btn');
  if(cb)cb.addEventListener('click',clearChecked);
}

// ═══════════════════════════════════════
//  ITEM OPERATIONS
// ═══════════════════════════════════════
function toggleItem(id){mutateItems(items=>items.map(i=>i.id===id?{...i,checked:!i.checked}:i));renderItems();updateProgress();}
function deleteItem(id){if(state.activeDayId===id)state.activeDayId=null;mutateItems(items=>items.filter(i=>i.id!==id));renderDetail();}
function toggleSubItem(gid,sid){mutateItems(items=>items.map(i=>i.id===gid?{...i,items:(i.items||[]).map(si=>si.id===sid?{...si,checked:!si.checked}:si)}:i));renderItems();updateProgress();}
function deleteSubItem(gid,sid){mutateItems(items=>items.map(i=>i.id===gid?{...i,items:(i.items||[]).filter(si=>si.id!==sid)}:i));renderItems();updateProgress();}
function toggleCollapse(gid){mutateItems(items=>items.map(i=>i.id===gid?{...i,collapsed:!i.collapsed}:i));renderItems();}
function clearChecked(){mutateItems(items=>items.filter(i=>!(i.type==='item'&&i.checked)).map(i=>i.type==='day-group'?{...i,items:(i.items||[]).filter(si=>!si.checked)}:i));renderDetail();}

function updateProgress(){
  const list=currentList();if(!list)return;
  const {total,done}=countItems(list.items);
  const pct=total?(done/total*100):0;
  const accent=list.accent||'#7c3aed';
  document.getElementById('detail-count').textContent=`${total} item${total!==1?'s':''}`;
  const prog=document.getElementById('detail-progress');
  if(total>0){prog.style.display='';document.getElementById('detail-progress-fill').style.cssText=`width:${pct}%;background:${accent}`;document.getElementById('detail-progress-label').textContent=`${done} of ${total} done`;}
  else prog.style.display='none';
}

function reorderItems(){
  mutateItems(items=>{
    const dayGroups=items.filter(i=>i.type==='day-group').sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day));
    const regular=items.filter(i=>i.type!=='day-group');
    return [...dayGroups,...regular];
  });
}

// ═══════════════════════════════════════
//  VOICE — ITEM PROCESSING
// ═══════════════════════════════════════
function processVoiceItem(text){
  const parsed=parseVoice(text);
  const list=currentList();if(!list)return;
  if(parsed.isDay){
    const existing=list.items?.find(i=>i.type==='day-group'&&i.day===parsed.day);
    if(existing){
      if(parsed.rest)addSubItem(existing.id,parsed.rest);
      state.activeDayId=existing.id;
      reorderItems();
    } else {
      addDayGroup(parsed.day,parsed.rest||null);
    }
  } else if(state.activeDayId){
    addSubItem(state.activeDayId,parsed.text);
  } else {
    addRegularItem(parsed.text);
  }
  renderDetail();
}

function addRegularItem(text){
  const t=capFirst(text);
  mutateItems(items=>[...items,{id:uid(),type:'item',text:t,checked:false}]);
  flash(`Added "${t}"`);
}
function addDayGroup(day,firstItem){
  const gid=uid();
  const subItems=firstItem?[{id:uid(),text:capFirst(firstItem),checked:false}]:[];
  mutateItems(items=>[...items,{id:gid,type:'day-group',day,collapsed:false,items:subItems}]);
  state.activeDayId=gid;
  flash(`Added ${capFirst(day)}${firstItem?` · "${capFirst(firstItem)}"`:''}`);
  reorderItems();
}
function addSubItem(gid,text){
  const t=capFirst(text);
  mutateItems(items=>items.map(i=>i.id===gid?{...i,items:[...(i.items||[]),{id:uid(),text:t,checked:false}]}:i));
  flash(`Added "${t}"`);
}

// ═══════════════════════════════════════
//  MIC BUTTON
// ═══════════════════════════════════════
const micBtn   = document.getElementById('mic-btn');
const micLabel = document.getElementById('mic-label');
const micWrap  = document.getElementById('mic-wrap');
const itemWfEl = document.getElementById('item-waveform');
const itemTxEl = document.getElementById('item-transcript');
const vBarEl   = document.getElementById('voice-bar');
let itemBars=[], keepListening=false;

const micIconIdle=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`;
const micIconStop=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`;

function setMicActive(on){
  if(on){
    micBtn.className='mic-btn active';
    micBtn.innerHTML=micIconStop+`<span class="mic-label">Tap to stop</span>`;
    vBarEl.style.display='';
    addRings();
  } else {
    micBtn.className='mic-btn idle';
    micBtn.innerHTML=micIconIdle+`<span class="mic-label">Tap to speak</span>`;
    vBarEl.style.display='none';
    removeRings();
    itemVoice.stopWave();
  }
}

function startItemListening(){
  itemBars=buildWave(itemWfEl);
  itemTxEl.textContent='Listening…';
  itemTxEl.className='voice-transcript';

  let holdTimer=null, pendingText='';

  itemVoice.start((text,isFinal)=>{
    itemTxEl.textContent=text||'Listening…';
    itemTxEl.className='voice-transcript'+(text?' has-text':'');
    if(isFinal&&text){
      clearTimeout(holdTimer);
      pendingText=text;
      holdTimer=setTimeout(()=>{
        if(pendingText){processVoiceItem(pendingText);pendingText='';}
      },300);
    }
  },{
    onEnd:()=>{
      clearTimeout(holdTimer);
      if(pendingText){processVoiceItem(pendingText);pendingText='';}
      if(keepListening){
        setTimeout(()=>{if(keepListening)startItemListening();},150);
      } else {
        setMicActive(false);
      }
    }
  });
  itemVoice.startWave(itemBars);
}

micBtn.addEventListener('click',()=>{
  if(keepListening){
    keepListening=false;
    itemVoice.stop(); itemVoice.stopWave();
    setMicActive(false);
    state.activeDayId=null;
  } else {
    keepListening=true;
    state.activeDayId=null;
    setMicActive(true);
    startItemListening();
  }
});

function addRings(){
  removeRings();
  [1,2].forEach(r=>{
    const d=document.createElement('div');
    d.className='mic-ring';
    const sz=52+r*22;
    d.style.cssText=`width:${sz}px;height:${sz}px;animation:pulseRing ${0.9+r*0.4}s ease-out infinite;animation-delay:${r*0.15}s`;
    micWrap.insertBefore(d,micWrap.firstChild);
  });
}
function removeRings(){micWrap.querySelectorAll('.mic-ring').forEach(r=>r.remove());}

// ═══════════════════════════════════════
//  BACK BUTTON
// ═══════════════════════════════════════
document.getElementById('back-btn').addEventListener('click',()=>{
  keepListening=false;
  itemVoice.stop(); itemVoice.stopWave();
  renameVoice.stop(); renameVoice.stopWave();
  setMicActive(false);
  state.activeDayId=null; state.renaming=false;
  renderHome(); showScreen('screen-home');
});

// ═══════════════════════════════════════
//  RENAME — tap name to listen
// ═══════════════════════════════════════
let renameBars=[];
const renameListeningEl=document.getElementById('rename-listening');
const renameTxEl=document.getElementById('rename-transcript');

document.getElementById('detail-title-left').addEventListener('click',()=>{
  if(state.renaming)return;
  state.renaming=true;
  renameListeningEl.style.display='flex';
  renameTxEl.textContent='Listening for new name…';
  renameTxEl.className='rename-transcript';
  renameBars=buildWave(document.createElement('div')); // dummy — no waveform in rename bar

  renameVoice.start((text,isFinal)=>{
    renameTxEl.textContent=text||'Listening for new name…';
    renameTxEl.className='rename-transcript'+(text?' has-text':'');
    if(isFinal&&text){
      const name=capFirst(text);
      state.lists=state.lists.map(l=>l.id===state.currentListId?{...l,name,icon:autoIcon(name)}:l);
      saveData();
      state.renaming=false;
      renameVoice.stop();
      renameListeningEl.style.display='none';
      renderDetail();
      flash(`Renamed to "${name}"`);
    }
  },{onEnd:()=>{
    if(state.renaming){
      state.renaming=false;
      renameListeningEl.style.display='none';
    }
  }});
});

document.getElementById('rename-cancel').addEventListener('click',()=>{
  state.renaming=false;
  renameVoice.stop();
  renameListeningEl.style.display='none';
});

//  SERVICE WORKER

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

//  INIT
// ═══════════════════════════════════════
renderHome();
</script>
