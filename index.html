<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Voxlist</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  :root {
    --bg:          #0e0e1a;
    --surface:     #16182a;
    --surface2:    #1e2138;
    --border:      rgba(255,255,255,0.08);
    --text:        rgba(255,255,255,0.92);
    --muted:       rgba(255,255,255,0.38);
    --purple:      #7c3aed;
    --purple2:     #4f46e5;
    --cyan:        #06b6d4;
    --red:         #dc2626;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); overflow: hidden; color-scheme: dark; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; padding-top: var(--safe-top); }
  .screen.active { display: flex; }
  .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px 16px; }
  .scroll::-webkit-scrollbar { display: none; }
  .header { padding: 20px 20px 12px; flex-shrink: 0; }
  .label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-top: 4px; }
  .bottom-bar { flex-shrink: 0; padding: 16px 24px; padding-bottom: calc(20px + var(--safe-bottom)); background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; }

  /* ── List cards ── */
  .list-card { display: flex; align-items: center; gap: 14px; padding: 16px 16px 16px 0; margin-bottom: 10px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); border-left: 4px solid var(--card-accent, var(--purple)); cursor: pointer; transition: background 0.15s; position: relative; overflow: hidden; }
  .list-card:active { background: var(--surface2); }
  .list-icon-wrap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 14px; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { font-size: 13px; color: var(--muted); margin-top: 3px; font-weight: 600; }
  .list-progress { margin-top: 8px; height: 3px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
  .list-progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .list-del { background: none; border: none; color: rgba(255,255,255,0.25); cursor: pointer; padding: 8px; flex-shrink: 0; display: flex; align-items: center; }

  /* ── FAB — rounded rect ── */
  .fab { display: flex; align-items: center; justify-content: center; gap: 8px; height: 48px; padding: 0 24px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--purple), var(--purple2)); color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 0 24px rgba(124,58,237,0.35), 0 4px 14px rgba(0,0,0,0.3); transition: transform 0.15s; }
  .fab:active { transform: scale(0.97); }

  /* ── Mic button — rounded rect, icon only ── */
  .mic-btn { display: flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 16px; border: none; font-family: inherit; cursor: pointer; transition: all 0.2s; position: relative; z-index: 1; }
  .mic-btn.idle   { background: linear-gradient(135deg, var(--purple), var(--purple2)); box-shadow: 0 0 22px rgba(124,58,237,0.3), 0 4px 14px rgba(0,0,0,0.3); }
  .mic-btn.active { background: linear-gradient(135deg, var(--red), #ef4444); box-shadow: 0 0 22px rgba(220,38,38,0.35), 0 4px 14px rgba(0,0,0,0.3); }
  .mic-btn:active { transform: scale(0.95); }
  .mic-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .mic-ring { position: absolute; border-radius: 18px; border: 1.5px solid rgba(124,58,237,0.2); pointer-events: none; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 80px 32px 32px; color: var(--muted); }
  .empty .ei { display: flex; justify-content: center; margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 16px; font-weight: 600; line-height: 1.5; }
  .empty small { font-size: 13px; color: rgba(255,255,255,0.2); margin-top: 8px; display: block; line-height: 1.6; }

  /* ── Progress ── */
  .progress-wrap { margin-top: 10px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 5px; font-weight: 600; }

  /* ── Detail header ── */
  .back-btn { background: none; border: none; color: #a78bfa; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-family: inherit; padding: 0; }
  .detail-title-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .detail-title-left { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; min-width: 0; }
  .detail-icon-wrap { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .detail-name-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
  .detail-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .count-badge { background: rgba(120,80,255,0.15); border: 1px solid rgba(120,80,255,0.3); border-radius: 20px; padding: 6px 14px; color: #a78bfa; font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

  /* ── Rename listening ── */
  .rename-listening { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding: 10px 14px; background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.25); border-radius: 12px; }
  .rename-transcript { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.45); font-style: italic; flex: 1; }
  .rename-transcript.has-text { color: rgba(255,255,255,0.85); font-style: normal; }
  .rename-cancel { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; }

  /* ── Items ── */
  .item-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; margin-bottom: 8px; border-radius: 14px; border: 1px solid var(--border); animation: slideIn 0.22s ease; background: var(--surface); transition: background 0.15s, opacity 0.15s; cursor: grab; user-select: none; }
  .item-row.checked { background: rgba(255,255,255,0.025); border-color: rgba(255,255,255,0.04); }
  .item-row.dragging { opacity: 0.4; cursor: grabbing; }
  .item-row.drag-over { border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.08); }
  .drag-handle { display: flex; align-items: center; color: rgba(255,255,255,0.18); flex-shrink: 0; cursor: grab; padding: 0 2px; }
  .checkbox { width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; border: 2px solid rgba(124,58,237,0.5); background: transparent; }
  .checkbox.done { background: linear-gradient(135deg, var(--purple), var(--cyan)); border: none; box-shadow: 0 0 10px rgba(124,58,237,0.35); }
  .item-text { flex: 1; font-size: 16px; font-weight: 600; transition: all 0.2s; }
  .item-text.done { color: rgba(255,255,255,0.25); text-decoration: line-through; }
  .item-del-btn { background: none; border: none; color: rgba(255,255,255,0.18); cursor: pointer; padding: 0 4px; display: flex; align-items: center; }
  .item-del-btn:active { color: rgba(239,68,68,0.7); }

  /* ── Day group ── */
  .day-group { margin-bottom: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.07); overflow: hidden; animation: slideIn 0.22s ease; }
  .day-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; }
  .day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .day-label { flex: 1; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .day-count { font-size: 12px; color: var(--muted); font-weight: 600; }
  .day-del { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 2px 4px; margin-left: 4px; display: flex; align-items: center; }
  .day-body { background: rgba(255,255,255,0.02); padding: 6px 8px 8px; }
  .sub-row { display: flex; align-items: center; gap: 10px; padding: 10px 10px; margin-bottom: 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); cursor: grab; user-select: none; transition: opacity 0.15s; }
  .sub-row.checked { background: rgba(255,255,255,0.015); border-color: rgba(255,255,255,0.03); }
  .sub-row.dragging { opacity: 0.4; }
  .sub-row.drag-over { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.06); }
  .sub-checkbox { width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .sub-text { flex: 1; font-size: 15px; font-weight: 600; transition: all 0.2s; }
  .sub-text.done { color: rgba(255,255,255,0.25); text-decoration: line-through; }
  .sub-del { background: none; border: none; color: rgba(255,255,255,0.15); cursor: pointer; padding: 0 4px; display: flex; align-items: center; }
  .day-empty { padding: 10px 8px; font-size: 13px; font-style: italic; color: rgba(255,255,255,0.2); font-weight: 600; }
  .clear-btn { text-align: center; color: rgba(239,68,68,0.45); font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer; border: none; background: none; width: 100%; font-family: inherit; }

  /* ── Drop zone between day groups and regular items ── */
  .drop-zone { height: 6px; border-radius: 3px; margin: 4px 0; transition: all 0.15s; }
  .drop-zone.active { height: 32px; background: rgba(124,58,237,0.12); border: 2px dashed rgba(124,58,237,0.4); border-radius: 10px; }

  /* ── Voice bar ── */
  .voice-bar { margin: 0 16px 10px; padding: 12px 16px; background: rgba(124,58,237,0.10); border: 1px solid rgba(124,58,237,0.22); border-radius: 14px; }
  .waveform { display: flex; align-items: center; justify-content: center; gap: 3px; height: 26px; margin-bottom: 6px; }
  .wave-bar { width: 3px; border-radius: 2px; transition: height 0.1s; }
  .voice-transcript { font-size: 13px; font-weight: 600; text-align: center; color: rgba(255,255,255,0.35); font-style: italic; min-height: 18px; }
  .voice-transcript.has-text { color: rgba(255,255,255,0.75); font-style: normal; }

  /* ── Create listening overlay ── */
  .create-listen { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 20px; padding: 40px; }
  .create-listen-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
  .create-listen-transcript { font-size: 26px; font-weight: 800; color: #fff; text-align: center; min-height: 38px; letter-spacing: -0.5px; }
  .create-listen-cancel { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: rgba(255,255,255,0.45); font-size: 14px; font-weight: 700; padding: 12px 28px; cursor: pointer; font-family: inherit; margin-top: 8px; }

  /* ── Flash ── */
  #flash { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, var(--purple), var(--cyan)); color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 15px; font-weight: 700; box-shadow: 0 8px 24px rgba(124,58,237,0.4); white-space: nowrap; z-index: 200; display: none; animation: fadeUp 0.2s ease; pointer-events: none; }

  /* ── Meal groups ── */
  .meal-group { margin-bottom: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.07); overflow: hidden; animation: slideIn 0.22s ease; }
  .meal-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; }
  .meal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .meal-label { flex: 1; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .meal-recipe-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-count { font-size: 12px; color: var(--muted); font-weight: 600; }
  .meal-del { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; padding: 2px 4px; margin-left: 2px; display: flex; align-items: center; }
  .meal-sparkle { background: none; border: none; cursor: pointer; padding: 2px 6px; font-size: 13px; font-weight: 700; font-family: inherit; display: flex; align-items: center; gap: 3px; opacity: 0.7; color: rgba(255,255,255,0.6); border-radius: 8px; transition: all 0.2s; }
  .meal-sparkle:active { opacity: 1; }
  .meal-sparkle.found { opacity: 1; color: #16a34a; background: rgba(22,163,74,0.12); border: 1px solid rgba(22,163,74,0.3); padding: 2px 8px; }
  .meal-body { background: rgba(255,255,255,0.02); padding: 6px 8px 8px; }
  /* ── Recipe finder overlay ── */
  .recipe-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 150; display: flex; flex-direction: column; padding-top: var(--safe-top); }
  .recipe-overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; flex-shrink: 0; }
  .recipe-overlay-title { font-size: 18px; font-weight: 800; }
  .recipe-overlay-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; display: flex; align-items: center; gap: 6px; }
  .recipe-url-row { display: flex; gap: 8px; padding: 8px 16px 12px; flex-shrink: 0; }
  .recipe-url-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
  .recipe-url-input:focus { border-color: rgba(139,92,246,0.5); }
  .recipe-fetch-btn { background: linear-gradient(135deg, var(--purple), var(--purple2)); border: none; border-radius: 12px; color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; padding: 10px 16px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .recipe-fetch-btn:disabled { opacity: 0.5; }
  .recipe-status { text-align: center; padding: 16px; color: var(--muted); font-size: 14px; font-weight: 600; font-style: italic; }
  .recipe-preview { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .recipe-preview::-webkit-scrollbar { display: none; }
  .recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
  .recipe-card-name { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .recipe-card-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
  .recipe-card-ingredients { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 12px; }
  .recipe-add-btn { width: 100%; background: linear-gradient(135deg, var(--purple), var(--purple2)); border: none; border-radius: 10px; color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; padding: 10px; cursor: pointer; }
  /* ── Recipe method screen ── */
  .method-screen { position: fixed; inset: 0; background: var(--bg); z-index: 140; display: flex; flex-direction: column; padding-top: var(--safe-top); overflow: hidden; }
  .method-header { padding: 16px 20px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .method-back { background: none; border: none; color: #a78bfa; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; padding: 0 0 10px; }
  .method-title { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; }
  .method-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 4px; }
  .method-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .method-scroll::-webkit-scrollbar { display: none; }
  .method-section { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin: 16px 0 10px; }
  .method-section:first-child { margin-top: 0; }
  .method-ingredient { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; font-weight: 600; }
  .method-step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .method-step-num { width: 24px; height: 24px; border-radius: 50%; background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.4); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #a78bfa; flex-shrink: 0; margin-top: 1px; }
  .method-step-text { flex: 1; font-size: 15px; font-weight: 600; line-height: 1.5; color: rgba(255,255,255,0.85); }
  .recipe-url-section { margin: 8px 16px 0; }
  .recipe-url-toggle { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.35); cursor: pointer; padding: 8px 0; list-style: none; }
  .recipe-url-toggle::-webkit-details-marker { display: none; }
  .recipe-url-section[open] .recipe-url-toggle { color: rgba(255,255,255,0.55); }
  @keyframes slideIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes pulseRing { 0%{opacity:0.5;transform:scale(0.9)} 100%{opacity:0;transform:scale(1.6)} }
  @keyframes todayPulse { 0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,0.4)} 50%{box-shadow:0 0 0 6px rgba(22,163,74,0)} }
  .today-group { animation:todayPulse 2.5s ease-in-out infinite; }
  .today-group .day-header { border-left: 3px solid #16a34a; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="header">
      <div class="label" style="color:#16a34a;letter-spacing:3px">VOXLIST</div>
      <div class="title">My Lists</div>
    </div>
    <div class="scroll" id="home-scroll"></div>
    <div class="bottom-bar">
      <button class="fab" id="fab-new" aria-label="New list">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New List
      </button>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="screen-detail">
    <div class="header">
      <button class="back-btn" id="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        All Lists
      </button>
      <div class="detail-title-row">
        <div class="detail-title-left" id="detail-title-left">
          <div class="detail-icon-wrap" id="detail-icon"></div>
          <div class="detail-name-wrap">
            <span class="detail-name" id="detail-name"></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
        </div>
        <div class="count-badge" id="detail-count"></div>
      </div>
      <div id="rename-listening" class="rename-listening" style="display:none;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span class="rename-transcript" id="rename-transcript">Listening for new name…</span>
        <button class="rename-cancel" id="rename-cancel">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="progress-wrap" id="detail-progress" style="display:none;">

function capFirst(s){s=(s||'').trim();return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Date helpers ──
function todayDate(){
  const d=new Date();d.setHours(0,0,0,0);return d;
}
function dateToKey(d){
  return d.toISOString().slice(0,10);
}
function keyToDate(k){
  const [y,m,d]=k.split('-').map(Number);
  const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;
}
function daysDiff(dateKey){
  const today=todayDate();
  const target=keyToDate(dateKey);
  return Math.round((target-today)/(1000*60*60*24));
}
function dayName(d){
  return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
}
function fullDayName(d){
  return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
}
function dateGroupLabel(dateKey){
  const diff=daysDiff(dateKey);
  const d=keyToDate(dateKey);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff===-1) return 'Yesterday';
  // Future within 7 days — just day name (clear enough)
  if(diff>1 && diff<=7) return fullDayName(d);
  // Past — always show date so it's distinct from day-of-week groups
  if(diff<-1) return `${dayName(d)} ${d.getDate()} ${months[d.getMonth()]}`;
  // Beyond 7 days future — day name + date
  return `${dayName(d)} ${d.getDate()} ${months[d.getMonth()]}`;
}
function nextWeekdayDate(dayName){
  const dayIdx=DAYS.indexOf(dayName);
  const today=todayDate();
  const todayIdx=today.getDay()===0?6:today.getDay()-1;
  let diff=dayIdx-todayIdx;
  if(diff<=0)diff+=7;
  const result=new Date(today);result.setDate(today.getDate()+diff);
  return dateToKey(result);
}
function lastWeekdayDate(dayName){
  // Most recent past occurrence of this day (always at least 1 day back)
  const dayIdx=DAYS.indexOf(dayName);
  const today=todayDate();
  const todayIdx=today.getDay()===0?6:today.getDay()-1;
  let diff=dayIdx-todayIdx;
  if(diff>=0)diff-=7;
  const result=new Date(today);result.setDate(today.getDate()+diff);
  return dateToKey(result);
}
function isTomorrow(dayName){
  // Returns true if the given day name is tomorrow's weekday
  const tomorrow=new Date(todayDate());
  tomorrow.setDate(tomorrow.getDate()+1);
  const tIdx=tomorrow.getDay()===0?6:tomorrow.getDay()-1; // Mon=0
  return DAYS.indexOf(dayName)===tIdx;
}

function parseVoice(text){
  const trimmed=text.trim();
  const lower=trimmed.toLowerCase();
  const today=todayDate();

  // "next [day]" e.g. "next wednesday hospital"
  const nextMatch=lower.match(/^next\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s*(.*)/);
  if(nextMatch){
    const day=nextMatch[1];
    const rest=trimmed.slice(trimmed.toLowerCase().indexOf(day)+day.length).trim();
    return{isDateGroup:true,dateKey:nextWeekdayDate(day),rest:capFirst(rest)};
  }

  // "last [day]" e.g. "last monday dentist"
  const lastMatch=lower.match(/^last\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\s*(.*)/);
  if(lastMatch){
    const day=lastMatch[1];
    const rest=trimmed.slice(trimmed.toLowerCase().indexOf(day)+day.length).trim();
    return{isDateGroup:true,dateKey:lastWeekdayDate(day),rest:capFirst(rest)};
  }

  // "day after tomorrow"
  if(lower.startsWith('day after tomorrow')){
    const t=new Date(today);t.setDate(today.getDate()+2);
    const rest=capFirst(trimmed.slice(18).trim());
    return{isDateGroup:true,dateKey:dateToKey(t),rest};
  }

  // "today", "tomorrow", "yesterday"
  if(lower.startsWith('today')){
    const rest=capFirst(trimmed.slice(5).trim());
    return{isDateGroup:true,dateKey:dateToKey(today),rest};
  }
  if(lower.startsWith('tomorrow')){
    const t=new Date(today);t.setDate(today.getDate()+1);
    const rest=capFirst(trimmed.slice(8).trim());
    return{isDateGroup:true,dateKey:dateToKey(t),rest};
  }
  if(lower.startsWith('yesterday')){
    const t=new Date(today);t.setDate(today.getDate()-1);
    const rest=capFirst(trimmed.slice(9).trim());
    return{isDateGroup:true,dateKey:dateToKey(t),rest};
  }

  // meal types — lunch and dinner trigger meal groups
  for(const meal of ['lunch','dinner']){
    if(lower.startsWith(meal)){
      const rest=trimmed.slice(meal.length).trim();
      return{isMeal:true,meal,rest:capFirst(rest)};
    }
  }

  // bare day names — check if it's tomorrow's day first
  for(const day of DAYS){
    if(lower.startsWith(day)){
      const rest=trimmed.slice(day.length).trim();
      const restLower=rest.toLowerCase();
      // Check if rest starts with a meal word -> day+meal combo
      for(const meal of ['lunch','dinner']){
        if(restLower.startsWith(meal)){
          const dishRest=capFirst(rest.slice(meal.length).trim())||null;
          if(isTomorrow(day)){
            const t=new Date(today);t.setDate(today.getDate()+1);
            return{isDateGroup:true,dateKey:dateToKey(t),rest:null,nestedMeal:meal,nestedDish:dishRest};
          }
          return{isDay:true,day,rest:null,nestedMeal:meal,nestedDish:dishRest};
        }
      }
      if(isTomorrow(day)){
        // This day IS tomorrow — treat as date group
        const t=new Date(today);t.setDate(today.getDate()+1);
        return{isDateGroup:true,dateKey:dateToKey(t),rest:capFirst(rest)};
      }
      // Otherwise permanent day-of-week group
      return{isDay:true,day,rest};
    }
  }
  return{isDay:false,text:trimmed};
}

const state={
  lists:loadData(),
  currentListId:null,
  activeDayId:null,
  renaming:false,
};
function currentList(){return state.lists.find(l=>l.id===state.currentListId);}
function mutateItems(fn){
  state.lists=state.lists.map(l=>l.id===state.currentListId?{...l,items:fn(l.items||[])}:l);
  saveData();
}
function countItems(items=[]){
  let total=0,done=0;
  function countDishes(dishes){
    for(const d of dishes||[]){
      for(const ing of d.ingredients||[]){total++;if(ing.checked)done++;}
    }
  }
  for(const item of items){
    if(item.type==='item'){total++;if(item.checked)done++;}
    else if(item.type==='meal-group'){
      countDishes(item.dishes);
    }
    else if(item.type==='day-group'){
      for(const si of item.items||[]){
        if(si.type==='item'){total++;if(si.checked)done++;}
        else if(si.type==='meal-container'){countDishes(si.dishes);}
        else if(si.type==='nested-meal'||si.type==='meal-group'){countDishes(si.dishes);}
        else{total++;if(si.checked)done++;} // plain sub-item
      }
    }
  }
  return{total,done};
}

function buildWave(container){
  container.innerHTML='';
  return Array.from({length:20},(_,i)=>{
    const b=document.createElement('div');
    b.className='wave-bar';
    b.style.background=`hsl(${260+i*4},70%,65%)`;
    b.style.height='4px';
    container.appendChild(b);
    return b;
  });
}

//  VOICE ENGINE
// ═══════════════════════════════════════
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function makeVoice(){
  let rec=null,waveTimer=null,isOn=false;
  return{
    get isOn(){return isOn;},
    start(onResult,opts={}){
      if(!SR){alert('Speech recognition requires Chrome.');return;}
      rec=new SR();rec.continuous=false;rec.interimResults=true;rec.lang='en-US';
      rec.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){const r=e.results[i];onResult(r[0].transcript.trim(),r.isFinal);}};
      rec.onend=()=>{isOn=false;if(opts.onEnd)opts.onEnd();};
      rec.onerror=()=>{isOn=false;if(opts.onEnd)opts.onEnd();};
      rec.start();isOn=true;
    },
    stop(){try{rec&&rec.stop();}catch{}isOn=false;},
    startWave(bars){waveTimer=setInterval(()=>{bars.forEach(b=>{b.style.height=(Math.random()*26+4)+'px';});},110);},
    stopWave(){clearInterval(waveTimer);}
  };
}
const itemVoice=makeVoice();
const createVoice=makeVoice();
const renameVoice=makeVoice();

function renderHome(){

  }
  scroll.innerHTML=state.lists.map(l=>{

    const accent=l.accent||'#7c3aed';
    const iconKey=l.iconKey||autoIconKey(l.name);
    return `
      <div class="list-card" data-id="${l.id}" style="--card-accent:${accent}">

          <div class="list-name">${esc(l.name)}</div>
          <div class="list-meta">${total} item${total!==1?'s':''} · ${done} done</div>
          ${total?`<div class="list-progress"><div class="list-progress-fill" style="width:${pct}%;background:${accent}"></div></div>`:''}
        </div>
        <button class="list-del" data-del="${l.id}">${SVG.trash}</button>
      </div>`;
  }).join('');
  scroll.querySelectorAll('.list-card').forEach(card=>{
    card.addEventListener('click',e=>{if(e.target.closest('[data-del]'))return;openList(card.dataset.id);});
  });

}

let createBars=[];

function openCreateListen(){history.pushState({screen:'create'},'');
  createBars=buildWave(createWf);
  createTx.textContent='Listening…';
  createOverlay.style.display='flex';
  createVoice.start((text,isFinal)=>{
    createTx.textContent=text||'Listening…';
    if(isFinal&&text){
      const name=capFirst(text);
      createVoice.stop();createVoice.stopWave();
      createOverlay.style.display='none';
      createNewList(name);
    }
  },{onEnd:()=>{createVoice.stopWave();}});
  createVoice.startWave(createBars);
}

function createNewList(name){

function openList(id){state.currentListId=id;state.activeDayId=null;state.renaming=false;renderDetail();showScreen('screen-detail');history.pushState({screen:'detail',listId:id},'');}

function renderDetail(){
  const list=currentList();if(!list)return;
  const accent=list.accent||'#7c3aed';
  const iconKey=list.iconKey||autoIconKey(list.name);
  const {total,done}=countItems(list.items);
  const pct=total?(done/total*100):0;
  document.getElementById('detail-icon').innerHTML=getIcon(iconKey,30);
  document.getElementById('detail-name').textContent=list.name;
  document.getElementById('detail-count').textContent=`${total} item${total!==1?'s':''}`;

  else prog.style.display='none';

}

// ── renderDish: renders a single dish card with ingredients and ✨ ──
function renderDish(dish, mealGid, mc, nested){
  // nested = null for standalone meal-group, {dayGid, mealGid} for day-nested
  const isDone=(dish.ingredients||[]).filter(i=>i.checked).length;
  const iTotal=(dish.ingredients||[]).length;
  const hasIng=iTotal>0;
  const hasRecipe=!!(dish.recipe);
  const foundSearch=!!(dish.recipeSearch);
  const sparkleColor=foundSearch?'#16a34a':'rgba(255,255,255,0.45)';
  const sparkleLabel=foundSearch?'✨ Found':'✨';
  // Encode nested context in data attrs
  const nestedAttrs=nested?`data-day-gid="${nested.dayGid}" data-meal-gid="${nested.mealGid}"`:'';
  const mealGidAttr=mealGid?`data-meal-gid="${mealGid}"`:'';
  return `<div class="dish-card" style="border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:6px;overflow:hidden;background:rgba(255,255,255,0.03);">
    <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;" data-dish-tap="${dish.id}" ${mealGidAttr} ${nestedAttrs}>
      <span style="flex:1;font-size:14px;font-weight:700;color:rgba(255,255,255,0.85)">${esc(dish.name)}</span>
      ${hasRecipe?`<span style="font-size:11px;color:${mc.bg};font-weight:600">${isDone}/${iTotal}</span>`:''}
      <button style="background:none;border:none;cursor:pointer;padding:2px 6px;font-size:12px;font-weight:700;font-family:inherit;border-radius:8px;color:${sparkleColor};${foundSearch?`background:rgba(22,163,74,0.12);border:1px solid rgba(22,163,74,0.25);`:''}" 
        data-dish-recipe="${dish.id}" ${mealGidAttr} ${nestedAttrs}>${sparkleLabel}</button>
      <button style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;padding:0 4px;display:flex;"
        data-dish-del="${dish.id}" ${mealGidAttr} ${nestedAttrs}>${SVG.close}</button>
    </div>
    ${hasIng&&!dish.collapsed?`
    <div style="padding:2px 10px 8px;">
      ${(dish.ingredients||[]).map(ing=>`
      <div class="sub-row ${ing.checked?'checked':''}" style="margin-bottom:3px;">
        <div class="sub-checkbox" style="${ing.checked?`background:${mc.bg};border:none`:`border:2px solid ${mc.bg}66;background:transparent`}"
          data-ing-toggle="${ing.id}" data-dish-id="${dish.id}" ${mealGidAttr} ${nestedAttrs}>
          ${ing.checked?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
        </div>
        <span class="sub-text ${ing.checked?'done':''}">${esc(ing.text)}</span>
        <button style="background:none;border:none;color:rgba(255,255,255,0.15);cursor:pointer;padding:0 4px;display:flex;"
          data-ing-del="${ing.id}" data-dish-id="${dish.id}" ${mealGidAttr} ${nestedAttrs}>${SVG.close}</button>
      </div>`).join('')}
    </div>`:''}
  </div>`;
}

function renderItems(){
  const list=currentList();
  const scroll=document.getElementById('detail-scroll');
  const items=list?.items||[];
  if(!items.length){
    scroll.innerHTML=`<div class="empty"><div class="ei"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div><p>Tap the mic and speak your items</p><small>Say a day first e.g. "Monday Drama club"<br>to create a day group</small></div>`;
    return;
  }

  let html='';
  for(const item of items){
    if(item.type==='meal-group'){
      const mc=MEAL_COLORS[item.meal]||MEAL_COLORS.dinner;
      let mTotal=0,mDone=0;
      for(const d of item.dishes||[]){for(const ing of d.ingredients||[]){mTotal++;if(ing.checked)mDone++;}}
      html+=`
        <div class="meal-group" data-mgid="${item.id}" style="border-color:${mc.border}">
          <div class="meal-header" style="background:${mc.light}">
            <div class="meal-dot" style="background:${mc.bg}"></div>
            <span class="meal-label" style="color:${mc.bg}">${item.meal}</span>
            <span class="meal-count">${mDone}/${mTotal}</span>
            <span style="color:rgba(255,255,255,0.3);display:flex;cursor:pointer" data-meal-collapse="${item.id}">${item.collapsed?SVG.chevD:SVG.chevU}</span>
            <button class="meal-del" data-mdel="${item.id}">${SVG.close}</button>
          </div>
          ${!item.collapsed?`
          <div class="day-body">
            ${!(item.dishes||[]).length?'<div class="day-empty">Speak a dish e.g. "Dinner spaghetti bolognese"</div>':
              (item.dishes||[]).map(dish=>renderDish(dish,item.id,mc,null)).join('')}
          </div>`:''}
        </div>`;

    } else if(item.type==='item'){
      html+=`
        <div class="item-row ${item.checked?'checked':''}" data-id="${item.id}" draggable="true">
          <div class="drag-handle" data-handle>${SVG.grip}</div>
          <div class="checkbox ${item.checked?'done':''}" data-toggle="${item.id}">
            ${item.checked?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
          </div>
          <span class="item-text ${item.checked?'done':''}">${esc(item.text)}</span>
          <button class="item-del-btn" data-del="${item.id}">${SVG.close}</button>
        </div>`;
    } else if(item.type==='day-group'){
      // Determine label and colour based on type
      const isDateGrp=!!item.dateKey;
      let dc, groupLabel;
      if(isDateGrp){
        const diff=daysDiff(item.dateKey);
        if(diff===0)       dc=DAY_COLORS.wednesday;
        else if(diff===1)  dc=DAY_COLORS.tuesday;
        else if(diff===-1) dc=DAY_COLORS.thursday;
        else if(diff>1)    dc=DAY_COLORS.saturday;
        else               dc=DAY_COLORS.monday;
        groupLabel=dateGroupLabel(item.dateKey);
      } else {
        dc=DAY_COLORS[item.day]||DAY_COLORS.monday;
        groupLabel=item.day;
      }
      const gDone=(item.items||[]).filter(si=>si.checked).length;
      const isTodayGroup=isDateGrp&&daysDiff(item.dateKey)===0;
      html+=`
        <div class="day-group${isTodayGroup?' today-group':''}" data-gid="${item.id}" style="border-color:${dc.border}">
          <div class="day-header" style="background:${dc.light}" data-collapse="${item.id}">
            <div class="day-dot" style="background:${dc.bg}"></div>
            <span class="day-label" style="color:${dc.bg}">${groupLabel}</span>
            <span class="day-count">${gDone}/${(item.items||[]).length}</span>
            <span style="color:rgba(255,255,255,0.3);display:flex">${item.collapsed?SVG.chevD:SVG.chevU}</span>
            <button class="day-del" data-gdel="${item.id}">${SVG.close}</button>
          </div>
          ${!item.collapsed?`
          <div class="day-body" data-gbody="${item.id}">
            ${!(item.items||[]).length?'<div class="day-empty">No items yet — speak to add</div>':
              (item.items||[]).map(si=>{
                if(si.type==='nested-meal'||si.type==='meal-container'){
                  const nmc=MEAL_COLORS[si.meal]||MEAL_COLORS.dinner;
                  let nTotal=0,nDone=0;
                  for(const d of si.dishes||[]){for(const ing of d.ingredients||[]){nTotal++;if(ing.checked)nDone++;}}
                  return `<div style="border:1px solid ${nmc.border};border-radius:12px;margin-bottom:6px;overflow:hidden;">
                    <div style="background:${nmc.light};display:flex;align-items:center;gap:8px;padding:9px 12px;">
                      <div style="width:6px;height:6px;border-radius:50%;background:${nmc.bg};flex-shrink:0"></div>
                      <span style="font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:${nmc.bg};flex:1">${si.meal}</span>
                      <span style="font-size:11px;color:rgba(255,255,255,0.4)">${nDone}/${nTotal}</span>
                      <button style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;padding:0 4px;display:flex;" data-nested-del="${si.id}" data-gid="${item.id}">${SVG.close}</button>
                    </div>
                    <div style="padding:4px 8px 8px;">
                      ${!(si.dishes||[]).length?'<div class="day-empty">Speak dish name to add</div>':
                        (si.dishes||[]).map(dish=>renderDish(dish,null,nmc,{dayGid:item.id,mealGid:si.id})).join('')}
                    </div>
                  </div>`;
                }
                return `
              <div class="sub-row ${si.checked?'checked':''}" data-sid="${si.id}" data-parent="${item.id}" draggable="true">
                <div class="drag-handle">${SVG.grip}</div>
                <div class="sub-checkbox" style="${si.checked?`background:${dc.bg};border:none`:`border:2px solid ${dc.bg}66;background:transparent`}" data-subtoggle="${si.id}" data-gid="${item.id}">
                  ${si.checked?`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}
                </div>
                <span class="sub-text ${si.checked?'done':''}">${esc(si.text)}</span>
                <button class="sub-del" data-subdel="${si.id}" data-gid="${item.id}">${SVG.close}</button>
              </div>`;
              }).join('')}
          </div>`:''}
        </div>`;
    }
  }

  const hasChecked=items.some(i=>(i.type==='item'&&i.checked)||(i.type==='day-group'&&(i.items||[]).some(si=>si.checked)));
  if(hasChecked)html+=`<button class="clear-btn" id="clear-btn">Clear completed</button>`;
  scroll.innerHTML=html;
  wireItemEvents(scroll);
  wireDrag(scroll);
}

function wireItemEvents(scroll){
  // Meal group events
  // meal-tap is now just visual, handled by meal-collapse
  scroll.querySelectorAll('[data-meal-collapse]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    toggleCollapse(el.dataset.mealCollapse);
  }));
  scroll.querySelectorAll('[data-meal-recipe]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    openRecipeOverlay(el.dataset.mealRecipe);
  }));
  scroll.querySelectorAll('[data-mdel]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    deleteMealGroup(el.dataset.mdel);
  }));
  scroll.querySelectorAll('[data-toggle]').forEach(el=>el.addEventListener('click',()=>toggleItem(el.dataset.toggle)));
  scroll.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteItem(el.dataset.del);}));
  scroll.querySelectorAll('[data-collapse]').forEach(el=>el.addEventListener('click',e=>{if(!e.target.closest('[data-gdel]'))toggleCollapse(el.dataset.collapse);}));
  scroll.querySelectorAll('[data-gdel]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteItem(el.dataset.gdel);}));
  scroll.querySelectorAll('[data-subtoggle]').forEach(el=>el.addEventListener('click',()=>toggleSubItem(el.dataset.gid,el.dataset.subtoggle)));
  scroll.querySelectorAll('[data-subdel]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();deleteSubItem(el.dataset.gid,el.dataset.subdel);}));
  // Dish events
  scroll.querySelectorAll('[data-dish-recipe]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    openDishRecipe(el.dataset.dishRecipe, el.dataset.mealGid||null, el.dataset.dayGid||null);
  }));
  scroll.querySelectorAll('[data-dish-del]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const{dishDel:dishId,mealGid,dayGid}=el.dataset;
    mutateItems(items=>items.map(i=>{
      if(dayGid){
        if(i.id!==dayGid) return i;
        return{...i,items:(i.items||[]).map(si=>{
          if(si.id!==mealGid) return si;
          return{...si,dishes:(si.dishes||[]).filter(d=>d.id!==dishId)};
        })};
      } else {
        if(i.id!==mealGid) return i;
        return{...i,dishes:(i.dishes||[]).filter(d=>d.id!==dishId)};
      }
    }));

// ═══════════════════════════════════════
//  DRAG AND DROP
// ═══════════════════════════════════════
function wireDrag(scroll){
  let dragEl=null, dragType=null, dragId=null, dragParent=null;

  function onDragStart(e){
    dragEl=e.currentTarget;
    // Determine type
    if(dragEl.classList.contains('item-row')){
      dragType='item'; dragId=dragEl.dataset.id; dragParent=null;
    } else if(dragEl.classList.contains('sub-row')){
      dragType='sub'; dragId=dragEl.dataset.sid; dragParent=dragEl.dataset.parent;
    }
    dragEl.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',dragId);
  }

  function onDragEnd(){
    if(dragEl)dragEl.classList.remove('dragging');
    scroll.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    dragEl=null; dragType=null; dragId=null; dragParent=null;
  }

  function onDragOver(e){
    e.preventDefault();
    const target=e.currentTarget;
    if(target===dragEl)return;
    scroll.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    target.classList.add('drag-over');
  }

  function onDrop(e){
    e.preventDefault();
    const target=e.currentTarget;
    target.classList.remove('drag-over');
    if(!dragEl||target===dragEl)return;

    if(dragType==='item'){
      // Dropping a regular item onto another regular item
      if(target.classList.contains('item-row')){
        const targetId=target.dataset.id;
        mutateItems(items=>{
          const list=[...items];
          const fromIdx=list.findIndex(i=>i.id===dragId);
          const toIdx=list.findIndex(i=>i.id===targetId);
          if(fromIdx<0||toIdx<0)return items;
          const [moved]=list.splice(fromIdx,1);
          list.splice(toIdx,0,moved);
          return list;
        });
        renderItems();
      }
      // Dropping a regular item into a day group body
      if(target.classList.contains('day-body')){
        const gid=target.dataset.gbody;
        mutateItems(items=>{
          const list=[...items];
          const fromIdx=list.findIndex(i=>i.id===dragId);
          if(fromIdx<0)return items;
          const [moved]=list.splice(fromIdx,1);
          // Convert to sub-item and add to group
          const subItem={id:uid(),text:moved.text,checked:moved.checked};
          return list.map(i=>i.id===gid?{...i,items:[...(i.items||[]),subItem]}:i);
        });
        renderDetail();
      }
    }

    if(dragType==='sub'){
      // Reorder within same day group
      if(target.classList.contains('sub-row')&&target.dataset.parent===dragParent){
        const targetSid=target.dataset.sid;
        mutateItems(items=>items.map(i=>{
          if(i.id!==dragParent)return i;
          const subs=[...i.items];
          const fromIdx=subs.findIndex(s=>s.id===dragId);
          const toIdx=subs.findIndex(s=>s.id===targetSid);
          if(fromIdx<0||toIdx<0)return i;
          const [moved]=subs.splice(fromIdx,1);
          subs.splice(toIdx,0,moved);
          return{...i,items:subs};
        }));
        renderItems();
      }
    }
  }

  // Wire regular items
  scroll.querySelectorAll('.item-row[draggable]').forEach(el=>{
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragend',onDragEnd);
    el.addEventListener('dragover',onDragOver);
    el.addEventListener('drop',onDrop);
  });

  // Wire sub-items
  scroll.querySelectorAll('.sub-row[draggable]').forEach(el=>{
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragend',onDragEnd);
    el.addEventListener('dragover',onDragOver);
    el.addEventListener('drop',onDrop);
  });

  // Wire day-body as drop target for regular items
  scroll.querySelectorAll('[data-gbody]').forEach(el=>{
    el.addEventListener('dragover',e=>{e.preventDefault();el.style.background='rgba(124,58,237,0.08)';});
    el.addEventListener('dragleave',()=>{el.style.background='';});
    el.addEventListener('drop',e=>{el.style.background='';onDrop(e);});
  });
}

// ── Nested meal helpers ──
function addNestedMealToDay(dayGid, meal, dish){
  const list=currentList(); if(!list) return;
  const dayGroup=list.items?.find(i=>i.id===dayGid);
  if(!dayGroup) return;
  // Find existing meal-container for this meal type inside the day
  const existingContainer=(dayGroup.items||[]).find(i=>i.type==='meal-container'&&i.meal===meal);
  if(existingContainer){
    if(dish){
      // Add a new dish to the existing container
      const newDish=makeDish(dish);
      mutateItems(items=>items.map(i=>{
        if(i.id!==dayGid) return i;
        return{...i,items:(i.items||[]).map(si=>{
          if(si.id!==existingContainer.id) return si;
          return{...si,dishes:[...(si.dishes||[]),newDish]};
        })};
      }));
      saveData();
      autoSearchForDish(existingContainer.id, dayGid, newDish.id, dish);
      flash(`Added "${capFirst(dish)}" to ${capFirst(meal)}`);
    }
    state.activeDayId=dayGid;
  } else {
    // Create new meal-container inside day group
    const mid=uid();
    const dishes=dish?[makeDish(dish)]:[];
    mutateItems(items=>items.map(i=>{
      if(i.id!==dayGid) return i;
      return{...i,items:[...(i.items||[]),{id:mid,type:'meal-container',meal,dishes,collapsed:false}]};
    }));
    saveData();
    if(dish&&dishes.length) autoSearchForDish(mid, dayGid, dishes[0].id, dish);
    state.activeDayId=dayGid;
    flash(`Added ${capFirst(meal)} to ${capFirst(dayGroup.day||dateGroupLabel(dayGroup.dateKey))}${dish?` · "${capFirst(dish)}"`:''}`);
  }
  reorderItems();
  renderDetail();
}

function reorderItems(){
  mutateItems(items=>{
    // Date groups (have dateKey) — sorted: today first, future asc, past desc
    const dateGroups=items.filter(i=>i.type==='day-group'&&i.dateKey).sort((a,b)=>{
      const da=daysDiff(a.dateKey), db=daysDiff(b.dateKey);
      // Order: yesterday(-1), today(0), tomorrow(+1), future asc, then older past desc
      function rank(d){
        if(d===-1)return 0;    // yesterday first
        if(d===0) return 1;    // today second
        if(d>0)   return 1+d;  // tomorrow=2, day after=3, future ascending
        return 1000+Math.abs(d); // past beyond yesterday at bottom, oldest last
      }
      return rank(da)-rank(db);
    });
    // Day-of-week groups (no dateKey) — Mon-Sun order
    const dayGroups=items.filter(i=>i.type==='day-group'&&!i.dateKey).sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day));
    const regular=items.filter(i=>i.type!=='day-group');
    return[...dateGroups,...dayGroups,...regular];
  });
}

//  VOICE ITEM PROCESSING
// ═══════════════════════════════════════
function processVoiceItem(text){
  const parsed=parseVoice(text);
  const list=currentList();if(!list)return;

  if(parsed.isMeal){
    // Check for standalone meal-group first
    const existingMealGroup=list.items?.find(i=>i.type==='meal-group'&&i.meal===parsed.meal);
    if(existingMealGroup){
      if(parsed.rest) addDishToMeal(existingMealGroup.id, parsed.rest);
      state.activeDayId=existingMealGroup.id;
      renderDetail();
      return;
    }
    // Check for meal-container inside any day/date group (active day first)
    let container=null, containerDayId=null;
    // Check active day group first
    if(state.activeDayId){
      const activeDay=list.items?.find(i=>i.id===state.activeDayId&&i.type==='day-group');
      if(activeDay){
        container=(activeDay.items||[]).find(si=>si.type==='meal-container'&&si.meal===parsed.meal);
        if(container) containerDayId=activeDay.id;
      }
    }
    // If not found in active day, search all day groups
    if(!container){
      for(const dayGrp of list.items?.filter(i=>i.type==='day-group')||[]){
        const found=(dayGrp.items||[]).find(si=>si.type==='meal-container'&&si.meal===parsed.meal);
        if(found){container=found;containerDayId=dayGrp.id;break;}
      }
    }
    if(container&&containerDayId){
      if(parsed.rest){
        const newDish=makeDish(parsed.rest);
        mutateItems(items=>items.map(i=>{
          if(i.id!==containerDayId) return i;
          return{...i,items:(i.items||[]).map(si=>
            si.id===container.id?{...si,dishes:[...(si.dishes||[]),newDish]}:si
          )};
        }));
        saveData();
        autoSearchForDish(container.id, containerDayId, newDish.id, parsed.rest);
        flash(`Added "${capFirst(parsed.rest)}" to ${capFirst(parsed.meal)}`);
      }
      state.activeDayId=containerDayId;
      renderDetail();
      return;
    }
    // No existing group or container — create standalone meal-group
    addMealGroup(parsed.meal, parsed.rest||null);
    renderDetail();
    return;
  }

  if(parsed.isDateGroup){
    // today/tomorrow/yesterday/next wednesday
    const existing=list.items?.find(i=>i.type==='day-group'&&i.dateKey===parsed.dateKey);
    if(parsed.nestedMeal){
      if(existing){
        addNestedMealToDay(existing.id, parsed.nestedMeal, parsed.nestedDish);
      } else {
        addDateGroupWithMeal(parsed.dateKey, parsed.nestedMeal, parsed.nestedDish);
      }
    } else {
      if(existing){
        if(parsed.rest)addSubItem(existing.id,parsed.rest);
        state.activeDayId=existing.id;
        reorderItems();
      } else {
        addDateGroup(parsed.dateKey,parsed.rest||null);
      }
    }
  } else if(parsed.isDay){
    const existing=list.items?.find(i=>i.type==='day-group'&&i.day===parsed.day&&!i.dateKey);
    if(parsed.nestedMeal){
      // "Monday dinner salmon" — add/find day group, add meal inside it
      if(existing){
        addNestedMealToDay(existing.id, parsed.nestedMeal, parsed.nestedDish);
      } else {
        addDayGroupWithMeal(parsed.day, parsed.nestedMeal, parsed.nestedDish);
      }
    } else {
      if(existing){
        if(parsed.rest)addSubItem(existing.id,parsed.rest);
        state.activeDayId=existing.id;
        reorderItems();
      } else {
        addDayGroup(parsed.day,parsed.rest||null);
      }
    }
  } else if(state.activeDayId){
    addSubItem(state.activeDayId,parsed.text);
  } else {
    addRegularItem(parsed.text);
  }
  renderDetail();
}

function addMealGroup(meal, dishName){

  }

function makeDish(name){
  return {id:uid(),type:'dish',name:capFirst(name),ingredients:[],recipe:null,recipeSearch:null,collapsed:false};
}

function addDishToMeal(mealGid, dishName){
  const dish=makeDish(dishName);
  mutateItems(items=>items.map(i=>i.id===mealGid?{...i,dishes:[...(i.dishes||[]),dish]}:i));
  saveData();
  autoSearchForDish(mealGid, null, dish.id, dishName);
  flash(`Added "${capFirst(dishName)}" to ${capFirst(currentList()?.items?.find(i=>i.id===mealGid)?.meal||'meal')}`);
}

async function autoSearchForDish(mealGid, dayGid, dishId, dishName){
  try {
    const query=encodeURIComponent(dishName.trim());
    const res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`);
    const data=await res.json();
    if(!data.meals||!data.meals.length) return;
    const recipe=parseMealDBResult(data.meals[0]);
    // Store recipeSearch on the dish
    mutateItems(items=>items.map(i=>{
      if(dayGid){
        // dish is inside a meal-container inside a day-group
        if(i.id!==dayGid) return i;
        return{...i,items:(i.items||[]).map(si=>{
          if(si.id!==mealGid) return si;
          return{...si,dishes:(si.dishes||[]).map(d=>d.id===dishId?{...d,recipeSearch:recipe}:d)};
        })};
      } else {
        // dish is in a standalone meal-group
        if(i.id!==mealGid) return i;
        return{...i,dishes:(i.dishes||[]).map(d=>d.id===dishId?{...d,recipeSearch:recipe}:d)};
      }
    }));
    flash(`Recipe found for "${recipe.name}" — tap ✨`);
    renderDetail();
  } catch(e){}
}


function parseMealDBResult(meal){
  const name=meal.strMeal||'Recipe';
  // Extract ingredients — MealDB uses strIngredient1..20 and strMeasure1..20
  const ingredients=[];
  for(let i=1;i<=20;i++){
    const ing=meal[`strIngredient${i}`];
    const meas=meal[`strMeasure${i}`];
    if(ing&&ing.trim()){
      const measure=(meas&&meas.trim())?meas.trim()+' ':'';
      ingredients.push(measure+ing.trim());
    }
  }
  // Extract steps — MealDB gives instructions as one block
  const steps=(meal.strInstructions||'')
    .split(/\r?\n+/)
    .map(s=>s.trim())
    .filter(s=>s.length>10);
  return{
    name,
    ingredients,
    servings:null,
    totalTime:null,
    steps,
    thumb:meal.strMealThumb||null,
    source:'themealdb'
  };
}

  itemTxEl.textContent='Listening…';itemTxEl.className='voice-transcript';
  let holdTimer=null,pendingText='';
  itemVoice.start((text,isFinal)=>{
    itemTxEl.textContent=text||'Listening…';
    itemTxEl.className='voice-transcript'+(text?' has-text':'');
    if(isFinal&&text){
      clearTimeout(holdTimer);pendingText=text;
      holdTimer=setTimeout(()=>{if(pendingText){processVoiceItem(pendingText);pendingText='';}},300);
    }
  },{
    onEnd:()=>{
      clearTimeout(holdTimer);
      if(pendingText){processVoiceItem(pendingText);pendingText='';}
      if(keepListening){setTimeout(()=>{if(keepListening)startItemListening();},150);}
      else{setMicActive(false);}
    }
  });
  itemVoice.startWave(itemBars);
}

micBtn.addEventListener('click',()=>{
  if(keepListening){
    keepListening=false;itemVoice.stop();itemVoice.stopWave();
    setMicActive(false);state.activeDayId=null;
  } else {
    keepListening=true;state.activeDayId=null;
    setMicActive(true);startItemListening();
  }
});

function addRings(){
  removeRings();
  [1,2].forEach(r=>{
    const d=document.createElement('div');d.className='mic-ring';
    const w=56+r*20,h=56+r*20;
    d.style.cssText=`width:${w}px;height:${h}px;animation:pulseRing ${0.9+r*0.4}s ease-out infinite;animation-delay:${r*0.15}s`;
    micWrap.insertBefore(d,micWrap.firstChild);
  });
}
function removeRings(){micWrap.querySelectorAll('.mic-ring').forEach(r=>r.remove());}

let activeRecipeGroupId = null;

const recipeOverlay  = document.getElementById('recipe-overlay');
const recipeUrlInput = document.getElementById('recipe-url-input');
const recipeFetchBtn = document.getElementById('recipe-fetch-btn');
const recipeStatus   = document.getElementById('recipe-status');
const recipePreview  = document.getElementById('recipe-preview');

document.getElementById('recipe-overlay-close').addEventListener('click', ()=>{
  recipeOverlay.style.display='none';
  activeRecipeGroupId=null;
  recipeUrlInput.value='';
  recipePreview.innerHTML='';

});

// activeDishContext: {mealGid, dayGid (or null), dishId}
let activeDishContext = null;

function openDishRecipe(dishId, mealGid, dayGid){
  activeDishContext = {dishId, mealGid, dayGid: dayGid||null};
  activeRecipeGroupId = null;
  activeNestedRecipeIds = null;
  // Find the dish
  const list = currentList();
  let dish = null;
  if(dayGid){
    const day = list?.items?.find(i=>i.id===dayGid);
    const container = day?.items?.find(i=>i.id===mealGid);
    dish = container?.dishes?.find(d=>d.id===dishId);
  } else {
    const mealGroup = list?.items?.find(i=>i.id===mealGid);
    dish = mealGroup?.dishes?.find(d=>d.id===dishId);
  }
  document.getElementById('recipe-overlay-title').textContent = dish?.name||'Recipe';
  recipeUrlInput.value = '';
  recipePreview.innerHTML = '';
  recipeOverlay.style.display = 'flex';
  if(dish?.recipeSearch){
    recipeStatus.textContent = '';
    showRecipePreview(dish.recipeSearch);
  } else if(dish?.name){
    recipeStatus.textContent = 'Searching…';
    searchMealDBAndShow(dish.name);
  } else {
    recipeStatus.textContent = 'Paste a recipe URL below';
  }
}

function openRecipeOverlay(gid){
  // Legacy: standalone meal-group ✨ button - find first dish or prompt
  activeRecipeGroupId=null; activeNestedRecipeIds=null; activeDishContext=null;
  const list=currentList();
  const group=list?.items?.find(i=>i.id===gid);
  document.getElementById('recipe-overlay-title').textContent=`${capFirst(group?.meal||'Meal')} — Recipe`;
  recipeUrlInput.value='';
  recipePreview.innerHTML='';
  recipeOverlay.style.display='flex';
  recipeStatus.textContent='Tap ✨ on a dish to find its recipe';
}


recipeFetchBtn.addEventListener('click', ()=>{
  const url=recipeUrlInput.value.trim();
  if(!url){recipeStatus.textContent='Please enter a URL first';return;}
  fetchRecipe(url);
});

recipeUrlInput.addEventListener('keydown', e=>{
  if(e.key==='Enter')recipeFetchBtn.click();
});

async function fetchRecipe(url){
  recipePreview.innerHTML='';
  recipeStatus.textContent='Fetching recipe…';
  recipeFetchBtn.disabled=true;

  try {
    const proxyUrl=`https://r.jina.ai/${encodeURIComponent(url)}`;
    const res=await fetch(proxyUrl, {headers:{'Accept':'text/html'}});
    const html=await res.text();
    const recipe=parseSchemaRecipe(html);
    if(recipe){
      showRecipePreview(recipe);
    } else {
      recipeStatus.textContent='No recipe found on this page. Try BBC Good Food, AllRecipes or Jamie Oliver.';
    }
  } catch(e){
    recipeStatus.textContent='Could not fetch the page. Check the URL and try again.';
  }
  recipeFetchBtn.disabled=false;
}

function parseSchemaRecipe(html){
  // Find all application/ld+json blocks
  const scriptRegex=/<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
  let match;
  while((match=scriptRegex.exec(html))!==null){
    try {
      const data=JSON.parse(match[1].trim());
      const recipe=findRecipeObject(data);
      if(recipe)return extractRecipeFields(recipe);
    } catch(e){ continue; }
  }
  return null;
}

function findRecipeObject(data){
  if(Array.isArray(data)){
    for(const item of data){
      const r=findRecipeObject(item);
      if(r)return r;
    }
  } else if(data&&typeof data==='object'){
    if(isRecipeType(data))return data;
    if(data['@graph']){
      for(const item of data['@graph']){
        if(isRecipeType(item))return item;
      }
    }
  }
  return null;
}

function isRecipeType(obj){
  const t=obj['@type'];
  if(!t)return false;
  if(typeof t==='string')return t==='Recipe';
  if(Array.isArray(t))return t.includes('Recipe');
  return false;
}

function extractRecipeFields(obj){
  const name=obj.name||'Untitled Recipe';

  const ingredients=(obj.recipeIngredient||[]).map(i=>{
    if(typeof i==='string')return i.trim();
    if(i&&i.name)return i.name.trim();
    return null;
  }).filter(Boolean);

  let servings=null;
  if(obj.recipeYield){
    servings=Array.isArray(obj.recipeYield)?obj.recipeYield[0]:obj.recipeYield;
    if(typeof servings==='object')servings=servings.value||null;
  }

  const totalTime=parseDurationStr(obj.totalTime)||parseDurationStr(obj.cookTime);

  // Extract method steps
  let steps=[];
  const instr=obj.recipeInstructions||[];
  if(Array.isArray(instr)){
    steps=instr.map(s=>{
      if(typeof s==='string')return s.trim();
      if(s.text)return s.text.trim();
      if(s.name)return s.name.trim();
      return null;
    }).filter(Boolean);
  } else if(typeof instr==='string'){
    steps=instr.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  }

  return{name,ingredients,servings,totalTime,steps};
}

function parseDurationStr(iso){
  if(!iso)return null;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if(!m)return null;
  const h=parseInt(m[1]||0),min=parseInt(m[2]||0);
  if(h&&min)return `${h}h ${min}m`;
  if(h)return `${h}h`;
  if(min)return `${min} mins`;
  return null;
}

function showRecipePreview(recipe){
  recipeStatus.textContent='';
  const ingList=recipe.ingredients.slice(0,5).map(i=>`• ${i}`).join('\n');
  const moreText=recipe.ingredients.length>5?` +${recipe.ingredients.length-5} more`:'';
  recipePreview.innerHTML=`
    <div class="recipe-card">
      <div class="recipe-card-name">${esc(recipe.name)}</div>
      <div class="recipe-card-meta">${[
        recipe.totalTime?`⏱ ${recipe.totalTime}`:'',
        recipe.servings?`🍽 Serves ${recipe.servings}`:'',
        `${recipe.ingredients.length} ingredients`,
        recipe.steps.length?`${recipe.steps.length} steps`:''
      ].filter(Boolean).join(' · ')}</div>
      <div class="recipe-card-ingredients">${esc(ingList)}${moreText}</div>
      <button class="recipe-add-btn" id="recipe-add-confirm">Add ingredients to list</button>
    </div>`;
  document.getElementById('recipe-add-confirm').addEventListener('click',()=>{
    addRecipeToGroup(recipe);
  });
}

function addRecipeToGroup(recipe){
  // Handle dish-based recipe
  if(activeDishContext){
    const{dishId, mealGid, dayGid}=activeDishContext;
    const ingredients=recipe.ingredients.map(ing=>({id:uid(),text:ing,checked:false}));
    const recipeData={name:recipe.name,servings:recipe.servings,totalTime:recipe.totalTime,steps:recipe.steps};
    mutateItems(items=>items.map(i=>{
      if(dayGid){
        if(i.id!==dayGid) return i;
        return{...i,items:(i.items||[]).map(si=>{
          if(si.id!==mealGid) return si;
          return{...si,dishes:(si.dishes||[]).map(d=>d.id===dishId?{...d,ingredients,recipe:recipeData,recipeSearch:null}:d)};
        })};
      } else {
        if(i.id!==mealGid) return i;
        return{...i,dishes:(i.dishes||[]).map(d=>d.id===dishId?{...d,ingredients,recipe:recipeData,recipeSearch:null}:d)};
      }
    }));
    saveData();
    recipeOverlay.style.display='none';
    activeDishContext=null;
    flash(`Recipe added — ${ingredients.length} ingredients`);
    renderDetail();
    return;
  }
  // Legacy nested recipe ids
  if(activeNestedRecipeIds){
    recipeOverlay.style.display='none';
    activeNestedRecipeIds=null;
    return;
  }
  if(!activeRecipeGroupId)return;
  // Replace sub-items with ingredients, store recipe data
  mutateItems(items=>items.map(i=>{
    if(i.id!==activeRecipeGroupId)return i;
    const subItems=recipe.ingredients.map(ing=>({id:uid(),text:ing,checked:false}));
    return{...i,
      items:subItems,
      recipe:{name:recipe.name,servings:recipe.servings,totalTime:recipe.totalTime,steps:recipe.steps}
    };
  }));
  saveData();
  recipeOverlay.style.display='none';
  activeRecipeGroupId=null;
  recipeUrlInput.value='';
  recipePreview.innerHTML='';
  flash(`Recipe added!`);
  renderDetail();
}

const methodScreen = document.getElementById('method-screen');

document.getElementById('method-back').addEventListener('click',()=>{

function openMethodScreen(dish){
  // dish can be a dish object or a legacy group object
  const r=dish.recipe;
  if(!r)return;
  document.getElementById('method-title').textContent=dish.name||r.name;
  document.getElementById('method-meta').textContent=[
    r.totalTime?`⏱ ${r.totalTime}`:'',
    r.servings?`🍽 Serves ${r.servings}`:'',
  ].filter(Boolean).join(' · ');

  const scroll=document.getElementById('method-scroll');
  let html='';

  // Ingredients from dish.ingredients array (new model) or dish.items (legacy)
  const ings=dish.ingredients||dish.items||[];
  if(ings.length){
    html+=`<div class="method-section">Ingredients</div>`;
    html+=ings.map(i=>`
      <div class="method-ingredient">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/></svg>
        ${esc(i.text)}
      </div>`).join('');
  }

  if(r.steps&&r.steps.length){
    html+=`<div class="method-section">Method</div>`;
    html+=r.steps.map((s,i)=>`
      <div class="method-step">
        <div class="method-step-num">${i+1}</div>
        <div class="method-step-text">${esc(s)}</div>
      </div>`).join('');
  } else {
    html+=`<div class="method-section">Method</div><div style="color:var(--muted);font-size:14px;padding:10px 0">No method steps found for this recipe.</div>`;
  }

  scroll.innerHTML=html;
  methodScreen.style.display='flex';
}
